<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>video doc tool</title>

    <!-- Inline-data favicon: stops Chrome from probing /favicon.ico, which on
         file:// triggers a noisy "Unsafe attempt to load URL" warning. -->
    <link rel="icon" href="data:," />

    <!-- Geist + Geist Mono. Fails gracefully if offline; system stack falls back. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/styles.css" />
    <script>
      // Apply persisted theme synchronously, before paint, to avoid a flash.
      try {
        var t = localStorage.getItem("sc.theme") || "dark";
        document.documentElement.setAttribute("data-theme", t);
      } catch (_) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    </script>
  </head>
  <body>
    <div class="page">
      <header class="top">
        <div class="brand">video doc tool</div>
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"></button>
      </header>

      <div id="drop" class="drop" tabindex="0" aria-label="Drop video files or a folder of images here">
        <div class="drop-title">Drop videos, image sequences, or a folder</div>
        <div class="drop-sub">
          mp4 · mov · webm · mkv · gif · png · jpg · webp &nbsp;·&nbsp; stays on your computer
        </div>
        <div id="drop-actions" class="drop-actions">
          <button type="button" id="btn-choose" class="btn">Choose…</button>
          <button type="button" id="btn-demo" class="btn ghost">Load demo</button>
        </div>
        <input type="file" id="file-input" class="sr" multiple />
        <input type="file" id="folder-input" class="sr" multiple webkitdirectory directory />
      </div>

      <div id="banner" class="banner"></div>

      <div id="spec-mount"></div>

      <section id="queue" class="queue" hidden>
        <div class="queue-head">
          <div id="queue-title" class="queue-title"></div>
          <div id="queue-actions" class="queue-actions"></div>
        </div>
        <div id="queue-list"></div>
      </section>

      <div class="actions">
        <button type="button" id="btn-export" class="btn primary" disabled>Export</button>
        <button type="button" id="btn-download-all" class="btn" hidden>Download all</button>
        <span class="spacer"></span>
        <span id="summary" class="summary"></span>
      </div>

      <footer class="foot">
        <span>files stay on your computer · nothing is uploaded</span>
        <span class="foot-links">
          <a
            href="https://github.com/languel/videodoctool"
            target="_blank"
            rel="noopener noreferrer"
            aria-label="GitHub repository"
            title="GitHub repository"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.4 3-.405 1.02.005 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" />
            </svg>
          </a>
          <a
            href="https://github.com/languel/videodoctool/releases/latest/download/videodoctool.zip"
            aria-label="Download standalone HTML (zipped)"
            title="Download standalone HTML (zipped)"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7 10 12 15 17 10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
          </a>
          <span id="version">v0.1</span>
        </span>
      </footer>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
